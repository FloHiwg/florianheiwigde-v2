sectionStops:
  - heading: intro
    stop: lake-tahoe
    label: Trip overview
    detail: A long Western USA loop through parks, cities, desert, and coast.
  - heading: from-berlin-to-lake-tahoe
    stop: lake-tahoe
    label: Arrival into the route
    detail: Berlin to San Francisco, then straight on to Lake Tahoe.
  - heading: lake-tahoe
    stop: lake-tahoe
    label: Lake Tahoe
    detail: Alpine start and first nature base of the route.
  - heading: from-lake-tahoe-to-yosemite
    stop: yosemite
    activeLeg: lake-tahoe-to-yosemite
    label: To Yosemite
    detail: Road transfer into the first major national-park section.
  - heading: yosemite
    stop: yosemite
    label: Yosemite
    detail: Valley days, park logistics, and big landscape moments.
  - heading: from-yosemite-to-sequoia
    stop: sequoia
    activeLeg: yosemite-to-sequoia
    label: To Sequoia
    detail: Shorter connector leg between two major park areas.
  - heading: sequoia
    stop: sequoia
    label: Sequoia
    detail: Giant trees, shorter stay, more route efficiency than city comfort.
  - heading: from-sequoia-to-las-vegas
    stop: las-vegas
    activeLeg: sequoia-to-las-vegas
    label: To Las Vegas
    detail: Leaving the California parks and resetting in the city.
  - heading: las-vegas
    stop: las-vegas
    label: Las Vegas
    detail: Pool, Strip, and Death Valley as a desert side trip.
  - heading: from-las-vegas-to-grand-canyon
    stop: grand-canyon
    activeLeg: las-vegas-to-grand-canyon
    label: To Grand Canyon
    detail: Back into road-trip mode after the city break.
  - heading: grand-canyon
    stop: grand-canyon
    label: Grand Canyon
    detail: Canyon viewpoints plus the Antelope Canyon side trip.
  - heading: from-grand-canyon-to-bryce
    stop: bryce
    activeLeg: grand-canyon-to-bryce
    label: To Bryce
    detail: Southwest driving leg into a quieter stop.
  - heading: bryce
    stop: bryce
    label: Bryce
    detail: Hoodoo landscapes and a shorter but distinct park stay.
  - heading: from-bryce-to-yellowstone
    stop: yellowstone
    activeLeg: bryce-to-yellowstone
    label: To Yellowstone
    detail: The biggest route jump, using both driving and flights.
  - heading: yellowstone
    stop: yellowstone
    label: Yellowstone
    detail: Large-scale park days around Gardiner and the north entrance.
  - heading: from-yellowstone-to-los-angeles
    stop: los-angeles
    activeLeg: yellowstone-to-los-angeles
    label: To Los Angeles
    detail: Another reset from nature scale back into urban California.
  - heading: los-angeles
    stop: los-angeles
    label: Los Angeles
    detail: Long Beach base, city time, and a San Diego day trip.
  - heading: from-los-angeles-to-monterey
    stop: monterey
    activeLeg: los-angeles-to-monterey
    label: North to Monterey
    detail: Start of the final California return leg.
  - heading: monterey
    stop: monterey
    label: Monterey
    detail: Slower coastal stop before the final city finish.
  - heading: from-monterey-to-san-francisco
    stop: san-francisco
    activeLeg: monterey-to-san-francisco
    label: To San Francisco
    detail: Final driving leg into the closing city stop.
  - heading: san-francisco
    stop: san-francisco
    label: San Francisco
    detail: Final city stay before flying home.
  - heading: from-san-francisco-to-berlin
    stop: san-francisco
    label: Flying home
    detail: The route ends in San Francisco before the return to Berlin.
  - heading: overall-lessons-learned
    stop: san-francisco
    label: Looking back on the route
    detail: Pacing, flights inside the route, and what the loop got right.
  - heading: final-verdict
    stop: san-francisco
    label: Final verdict
    detail: Was the variety worth the complexity?
