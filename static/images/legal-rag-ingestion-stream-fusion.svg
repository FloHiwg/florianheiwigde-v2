<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Ingestion Stream Fusion Pipeline</title>
  <desc id="desc">Multiple ingestion streams flow into one fusion layer and end in a shared unified document pool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--bg-start)"/>
      <stop offset="100%" stop-color="var(--bg-end)"/>
    </linearGradient>
    <linearGradient id="pool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--pool-grad-start)"/>
      <stop offset="100%" stop-color="var(--pool-grad-end)"/>
    </linearGradient>
    <style>
      :root {
        --bg-start: #f8fafc;
        --bg-end: #eef2ff;
        --pool-grad-start: #ffffff;
        --pool-grad-end: #e2e8f0;
        --text-primary: #0f172a;
        --text-secondary: #475569;
        --text-body: #334155;
        --lane-1-fill: #dbeafe;
        --lane-1-stroke: #60a5fa;
        --lane-2-fill: #dcfce7;
        --lane-2-stroke: #4ade80;
        --lane-3-fill: #fef9c3;
        --lane-3-stroke: #facc15;
        --lane-4-fill: #fee2e2;
        --lane-4-stroke: #f87171;
        --lane-5-fill: #ede9fe;
        --lane-5-stroke: #a78bfa;
        --fusion-fill: #ffffff;
        --fusion-stroke: #94a3b8;
        --panel-fill: #f8fafc;
        --panel-stroke: #cbd5e1;
        --edge: #334155;
        --pool-cap: #cbd5e1;
        --pool-bottom: #e2e8f0;
        --pool-top: #ffffff;
        --pool-stroke: #94a3b8;
        --callout-bg: #0f172a;
        --callout-text: #f8fafc;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-start: #0b1220;
          --bg-end: #131b2f;
          --pool-grad-start: #111827;
          --pool-grad-end: #1f2937;
          --text-primary: #e5edf8;
          --text-secondary: #c0cedf;
          --text-body: #a9bad0;
          --lane-1-fill: #1a2c45;
          --lane-1-stroke: #60a5fa;
          --lane-2-fill: #162c24;
          --lane-2-stroke: #4ade80;
          --lane-3-fill: #3a3012;
          --lane-3-stroke: #fcd34d;
          --lane-4-fill: #3b1f24;
          --lane-4-stroke: #fb7185;
          --lane-5-fill: #2b2144;
          --lane-5-stroke: #a78bfa;
          --fusion-fill: #111827;
          --fusion-stroke: #475569;
          --panel-fill: #1f2937;
          --panel-stroke: #4b5563;
          --edge: #94a3b8;
          --pool-cap: #334155;
          --pool-bottom: #1f2937;
          --pool-top: #111827;
          --pool-stroke: #64748b;
          --callout-bg: #dbe5f3;
          --callout-text: #0f172a;
        }
      }

      .title { font: 700 42px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .subtitle { font: 500 20px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-secondary); }
      .lane { font: 700 24px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .small { font: 500 17px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-body); }
      .stage { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .poolTitle { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .poolText { font: 500 20px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-body); }
      .callout { font: 600 22px 'Helvetica Neue', Arial, sans-serif; fill: var(--callout-text); }
    </style>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,4 L0,8 z" fill="var(--edge)"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="980" fill="url(#bg)"/>

  <text class="title" x="70" y="90">Ingestion Lifecycle: Multi-Stream Fusion into One Document Pool</text>
  <text class="subtitle" x="70" y="128">Different public-data streams are normalized through one shared ingestion path</text>
  <text class="subtitle" x="70" y="156">and converge into a canonical corpus.</text>

  <!-- Input lanes -->
  <rect x="70" y="200" width="430" height="105" rx="18" fill="var(--lane-1-fill)" stroke="var(--lane-1-stroke)" stroke-width="3"/>
  <text class="lane" x="105" y="245">Sitemap Stream</text>
  <text class="small" x="105" y="276">trusted domains, recurring refresh</text>

  <rect x="70" y="330" width="430" height="105" rx="18" fill="var(--lane-2-fill)" stroke="var(--lane-2-stroke)" stroke-width="3"/>
  <text class="lane" x="105" y="375">Direct URL Stream</text>
  <text class="small" x="105" y="406">manual seeds, curated additions</text>

  <rect x="70" y="460" width="430" height="105" rx="18" fill="var(--lane-3-fill)" stroke="var(--lane-3-stroke)" stroke-width="3"/>
  <text class="lane" x="105" y="505">Search-Intent Stream</text>
  <text class="small" x="105" y="536">SERP discovery, long-tail queries</text>

  <rect x="70" y="590" width="430" height="105" rx="18" fill="var(--lane-4-fill)" stroke="var(--lane-4-stroke)" stroke-width="3"/>
  <text class="lane" x="105" y="635">Document Drop Stream</text>
  <text class="small" x="105" y="666">S3/PDF uploads, external batches</text>

  <rect x="70" y="720" width="430" height="105" rx="18" fill="var(--lane-5-fill)" stroke="var(--lane-5-stroke)" stroke-width="3"/>
  <text class="lane" x="105" y="765">Future Streams</text>
  <text class="small" x="105" y="796">judgments, APIs, partner feeds</text>

  <!-- Fusion stage -->
  <rect x="620" y="285" width="470" height="450" rx="26" fill="var(--fusion-fill)" stroke="var(--fusion-stroke)" stroke-width="4"/>
  <text class="stage" x="670" y="345">Ingestion Fusion Layer</text>

  <rect x="665" y="380" width="380" height="74" rx="12" fill="var(--panel-fill)" stroke="var(--panel-stroke)" stroke-width="2"/>
  <text class="small" x="685" y="425">Refresh scheduler (last_fetch policy)</text>

  <rect x="665" y="470" width="380" height="74" rx="12" fill="var(--panel-fill)" stroke="var(--panel-stroke)" stroke-width="2"/>
  <text class="small" x="685" y="515">Fetch, parse, and Markdown cleanup</text>

  <rect x="665" y="560" width="380" height="74" rx="12" fill="var(--panel-fill)" stroke="var(--panel-stroke)" stroke-width="2"/>
  <text class="small" x="685" y="605">Hash compare and dedupe gate</text>

  <!-- Arrows from streams to fusion -->
  <line x1="500" y1="252" x2="620" y2="415" stroke="var(--edge)" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="382" x2="620" y2="450" stroke="var(--edge)" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="512" x2="620" y2="510" stroke="var(--edge)" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="642" x2="620" y2="570" stroke="var(--edge)" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="772" x2="620" y2="620" stroke="var(--edge)" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- to pool -->
  <line x1="1090" y1="510" x2="1240" y2="510" stroke="var(--edge)" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Document pool (cylinder-like) -->
  <ellipse cx="1495" cy="390" rx="200" ry="52" fill="var(--pool-cap)"/>
  <rect x="1295" y="390" width="400" height="250" fill="url(#pool)" stroke="var(--pool-stroke)" stroke-width="4"/>
  <ellipse cx="1495" cy="640" rx="200" ry="52" fill="var(--pool-bottom)" stroke="var(--pool-stroke)" stroke-width="4"/>
  <ellipse cx="1495" cy="390" rx="200" ry="52" fill="var(--pool-top)" stroke="var(--pool-stroke)" stroke-width="4"/>

  <text class="poolTitle" x="1495" y="470" text-anchor="middle">Unified Document Pool</text>
  <text class="poolText" x="1495" y="515" text-anchor="middle">canonical Markdown docs</text>
  <text class="poolText" x="1495" y="548" text-anchor="middle">metadata + source lineage</text>
  <text class="poolText" x="1495" y="581" text-anchor="middle">content hash state</text>

  <rect x="560" y="812" width="1120" height="108" rx="16" fill="var(--callout-bg)"/>
  <text class="callout" x="1120" y="860" text-anchor="middle">All inputs converge into one consistent corpus.</text>
  <text class="callout" x="1120" y="892" text-anchor="middle">Downstream Silver and Retrieval operate on one shared schema.</text>
</svg>
