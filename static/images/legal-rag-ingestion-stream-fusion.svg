<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980" role="img" aria-labelledby="title desc">
  <title id="title">Ingestion Stream Fusion Pipeline</title>
  <desc id="desc">Multiple ingestion streams flow into one fusion layer and end in a shared unified document pool.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="pool" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e2e8f0"/>
    </linearGradient>
    <style>
      .title { font: 700 42px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .lane { font: 700 24px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .small { font: 500 17px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .stage { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .poolTitle { font: 700 28px 'Helvetica Neue', Arial, sans-serif; fill: #0f172a; }
      .poolText { font: 500 20px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="980" fill="url(#bg)"/>

  <text class="title" x="70" y="90">Ingestion Lifecycle: Multi-Stream Fusion into One Document Pool</text>
  <text class="subtitle" x="70" y="128">Different public-data streams are normalized through one shared ingestion path</text>
  <text class="subtitle" x="70" y="156">and converge into a canonical corpus.</text>

  <!-- Input lanes -->
  <rect x="70" y="200" width="430" height="105" rx="18" fill="#dbeafe" stroke="#60a5fa" stroke-width="3"/>
  <text class="lane" x="105" y="245">Sitemap Stream</text>
  <text class="small" x="105" y="276">trusted domains, recurring refresh</text>

  <rect x="70" y="330" width="430" height="105" rx="18" fill="#dcfce7" stroke="#4ade80" stroke-width="3"/>
  <text class="lane" x="105" y="375">Direct URL Stream</text>
  <text class="small" x="105" y="406">manual seeds, curated additions</text>

  <rect x="70" y="460" width="430" height="105" rx="18" fill="#fef9c3" stroke="#facc15" stroke-width="3"/>
  <text class="lane" x="105" y="505">Search-Intent Stream</text>
  <text class="small" x="105" y="536">SERP discovery, long-tail queries</text>

  <rect x="70" y="590" width="430" height="105" rx="18" fill="#fee2e2" stroke="#f87171" stroke-width="3"/>
  <text class="lane" x="105" y="635">Document Drop Stream</text>
  <text class="small" x="105" y="666">S3/PDF uploads, external batches</text>

  <rect x="70" y="720" width="430" height="105" rx="18" fill="#ede9fe" stroke="#a78bfa" stroke-width="3"/>
  <text class="lane" x="105" y="765">Future Streams</text>
  <text class="small" x="105" y="796">judgments, APIs, partner feeds</text>

  <!-- Fusion stage -->
  <rect x="620" y="285" width="470" height="450" rx="26" fill="#ffffff" stroke="#94a3b8" stroke-width="4"/>
  <text class="stage" x="670" y="345">Ingestion Fusion Layer</text>

  <rect x="665" y="380" width="380" height="74" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text class="small" x="685" y="425">Refresh scheduler (last_fetch policy)</text>

  <rect x="665" y="470" width="380" height="74" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text class="small" x="685" y="515">Fetch, parse, and Markdown cleanup</text>

  <rect x="665" y="560" width="380" height="74" rx="12" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text class="small" x="685" y="605">Hash compare and dedupe gate</text>

  <!-- Arrows from streams to fusion -->
  <line x1="500" y1="252" x2="620" y2="415" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="382" x2="620" y2="450" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="512" x2="620" y2="510" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="642" x2="620" y2="570" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>
  <line x1="500" y1="772" x2="620" y2="620" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <!-- to pool -->
  <line x1="1090" y1="510" x2="1240" y2="510" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>

  <!-- Document pool (cylinder-like) -->
  <ellipse cx="1495" cy="390" rx="200" ry="52" fill="#cbd5e1"/>
  <rect x="1295" y="390" width="400" height="250" fill="url(#pool)" stroke="#94a3b8" stroke-width="4"/>
  <ellipse cx="1495" cy="640" rx="200" ry="52" fill="#e2e8f0" stroke="#94a3b8" stroke-width="4"/>
  <ellipse cx="1495" cy="390" rx="200" ry="52" fill="#ffffff" stroke="#94a3b8" stroke-width="4"/>

  <text class="poolTitle" x="1495" y="470" text-anchor="middle">Unified Document Pool</text>
  <text class="poolText" x="1495" y="515" text-anchor="middle">canonical Markdown docs</text>
  <text class="poolText" x="1495" y="548" text-anchor="middle">metadata + source lineage</text>
  <text class="poolText" x="1495" y="581" text-anchor="middle">content hash state</text>

  <rect x="560" y="812" width="1120" height="108" rx="16" fill="#0f172a"/>
  <text x="1120" y="860" text-anchor="middle" style="font:600 22px 'Helvetica Neue', Arial, sans-serif; fill:#f8fafc;">
    All inputs converge into one consistent corpus.
  </text>
  <text x="1120" y="892" text-anchor="middle" style="font:600 22px 'Helvetica Neue', Arial, sans-serif; fill:#f8fafc;">
    Downstream Silver and Retrieval operate on one shared schema.
  </text>
</svg>
