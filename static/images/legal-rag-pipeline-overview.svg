<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Public Data Legal RAG Pipeline Overview</title>
  <desc id="desc">Simple overview with left input streams merging into one linear pipeline: Bronze, Silver, Retrieval, and Answer/Evaluation.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--bg-start)"/>
      <stop offset="100%" stop-color="var(--bg-end)"/>
    </linearGradient>

    <style>
      :root {
        --bg-start: #f8fafc;
        --bg-end: #eef2ff;

        --text-primary: #0f172a;
        --text-secondary: #475569;
        --edge: #334155;

        --panel-fill: #ffffff;
        --panel-stroke: #cbd5e1;

        --stream-1-fill: #dbeafe;
        --stream-1-stroke: #60a5fa;
        --stream-2-fill: #dcfce7;
        --stream-2-stroke: #4ade80;
        --stream-3-fill: #fef9c3;
        --stream-3-stroke: #facc15;
        --stream-4-fill: #fee2e2;
        --stream-4-stroke: #f87171;

        --merge-fill: #e2e8f0;
        --merge-stroke: #94a3b8;

        --bronze-fill: #bfdbfe;
        --bronze-stroke: #3b82f6;
        --silver-fill: #dcfce7;
        --silver-stroke: #22c55e;
        --retrieval-fill: #fef9c3;
        --retrieval-stroke: #eab308;
        --answer-fill: #ffe4e6;
        --answer-stroke: #fb7185;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-start: #0b1220;
          --bg-end: #131b2f;

          --text-primary: #e5edf8;
          --text-secondary: #bed0e5;
          --edge: #94a3b8;

          --panel-fill: #0f172a;
          --panel-stroke: #334155;

          --stream-1-fill: #1a2c45;
          --stream-1-stroke: #60a5fa;
          --stream-2-fill: #162c24;
          --stream-2-stroke: #4ade80;
          --stream-3-fill: #3a3012;
          --stream-3-stroke: #facc15;
          --stream-4-fill: #3b1f24;
          --stream-4-stroke: #fb7185;

          --merge-fill: #1f2937;
          --merge-stroke: #64748b;

          --bronze-fill: #1e3a8a;
          --bronze-stroke: #60a5fa;
          --silver-fill: #163125;
          --silver-stroke: #4ade80;
          --retrieval-fill: #3a3012;
          --retrieval-stroke: #facc15;
          --answer-fill: #3a1f31;
          --answer-stroke: #f472b6;
        }
      }

      .title { font: 700 42px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .subtitle { font: 500 20px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-secondary); }
      .panel-title { font: 700 24px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .stream-title { font: 700 24px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .stream-text { font: 500 17px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-secondary); }
      .merge-text { font: 700 20px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .card-title { font: 700 24px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-primary); }
      .card-text { font: 500 17px 'Helvetica Neue', Arial, sans-serif; fill: var(--text-secondary); }
    </style>

    <style>
      .connector { stroke: var(--edge); stroke-width: 4; stroke-linecap: round; }
      .stream-connector { stroke: var(--edge); stroke-width: 3; stroke-linecap: round; }
      .arrowhead { fill: var(--edge); }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="960" fill="url(#bg)"/>

  <text class="title" x="70" y="88">Public Data Legal RAG: Pipeline Overview</text>
  <text class="subtitle" x="70" y="124">Input streams merge once, then move through one linear Bronze-to-Answer flow.</text>

  <rect x="60" y="170" width="380" height="720" rx="20" fill="var(--panel-fill)" stroke="var(--panel-stroke)" stroke-width="3"/>
  <text class="panel-title" x="90" y="214">Input Streams</text>

  <rect x="95" y="250" width="310" height="120" rx="14" fill="var(--stream-1-fill)" stroke="var(--stream-1-stroke)" stroke-width="3"/>
  <text class="stream-title" x="120" y="296">Sitemap</text>
  <text class="stream-text" x="120" y="328">trusted domains, scheduled refresh</text>

  <rect x="95" y="390" width="310" height="120" rx="14" fill="var(--stream-2-fill)" stroke="var(--stream-2-stroke)" stroke-width="3"/>
  <text class="stream-title" x="120" y="436">Direct URLs</text>
  <text class="stream-text" x="120" y="468">curated manual seeds</text>

  <rect x="95" y="530" width="310" height="120" rx="14" fill="var(--stream-3-fill)" stroke="var(--stream-3-stroke)" stroke-width="3"/>
  <text class="stream-title" x="120" y="576">Search-Intent</text>
  <text class="stream-text" x="120" y="608">SERP query discovery</text>

  <rect x="95" y="670" width="310" height="120" rx="14" fill="var(--stream-4-fill)" stroke="var(--stream-4-stroke)" stroke-width="3"/>
  <text class="stream-title" x="120" y="716">S3 / PDF</text>
  <text class="stream-text" x="120" y="748">batch document drops</text>

  <line class="stream-connector" x1="405" y1="310" x2="438" y2="485"/>
  <line class="stream-connector" x1="405" y1="450" x2="438" y2="495"/>
  <line class="stream-connector" x1="405" y1="590" x2="438" y2="505"/>
  <line class="stream-connector" x1="405" y1="730" x2="438" y2="515"/>

  <circle cx="480" cy="500" r="42" fill="var(--merge-fill)" stroke="var(--merge-stroke)" stroke-width="3"/>
  <text class="merge-text" x="480" y="507" text-anchor="middle">Merge</text>

  <line class="connector" x1="522" y1="500" x2="544" y2="500"/>
  <polygon class="arrowhead" points="560,500 544,491 544,509"/>

  <rect x="560" y="405" width="200" height="190" rx="16" fill="var(--bronze-fill)" stroke="var(--bronze-stroke)" stroke-width="3"/>
  <text class="card-title" x="660" y="460" text-anchor="middle">Bronze</text>
  <text class="card-text" x="660" y="496" text-anchor="middle">ingest + refresh</text>
  <text class="card-text" x="660" y="522" text-anchor="middle">hash dedupe</text>

  <rect x="790" y="405" width="200" height="190" rx="16" fill="var(--silver-fill)" stroke="var(--silver-stroke)" stroke-width="3"/>
  <text class="card-title" x="890" y="460" text-anchor="middle">Silver</text>
  <text class="card-text" x="890" y="496" text-anchor="middle">normalize docs</text>
  <text class="card-text" x="890" y="522" text-anchor="middle">semantic chunking</text>

  <rect x="1020" y="405" width="200" height="190" rx="16" fill="var(--retrieval-fill)" stroke="var(--retrieval-stroke)" stroke-width="3"/>
  <text class="card-title" x="1120" y="460" text-anchor="middle">Retrieval</text>
  <text class="card-text" x="1120" y="496" text-anchor="middle">hybrid retrieval</text>
  <text class="card-text" x="1120" y="522" text-anchor="middle">context assembly</text>

  <rect x="1250" y="405" width="280" height="190" rx="16" fill="var(--answer-fill)" stroke="var(--answer-stroke)" stroke-width="3"/>
  <text class="card-title" x="1390" y="460" text-anchor="middle">Answer / Evaluation</text>
  <text class="card-text" x="1390" y="496" text-anchor="middle">generate grounded output</text>
  <text class="card-text" x="1390" y="522" text-anchor="middle">score benchmark runs</text>

  <line class="connector" x1="760" y1="500" x2="776" y2="500"/>
  <polygon class="arrowhead" points="790,500 776,492 776,508"/>

  <line class="connector" x1="990" y1="500" x2="1006" y2="500"/>
  <polygon class="arrowhead" points="1020,500 1006,492 1006,508"/>

  <line class="connector" x1="1220" y1="500" x2="1236" y2="500"/>
  <polygon class="arrowhead" points="1250,500 1236,492 1236,508"/>
</svg>
